<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0b0c1b; color: #ffffff; padding: 15px; }
        
        .header-title { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #a855f7; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Navigation Grid */
        .admin-nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .nav-card { background: #18192d; border: 1px solid #23243f; border-radius: 12px; padding: 12px 6px; text-align: center; cursor: pointer; transition: 0.2s; }
        .nav-card:hover, .nav-card.active { border-color: #a855f7; background: #23243f; }
        .nav-card i { font-size: 20px; color: #a855f7; margin-bottom: 5px; }
        .nav-card p { font-size: 11px; color: #e2e8f0; font-weight: 600; }

        /* Sections */
        .admin-section { display: none; background: #18192d; border: 1px solid #23243f; border-radius: 16px; padding: 18px; margin-bottom: 20px; }
        .admin-section.active { display: block; }
        
        .section-header { font-size: 16px; font-weight: 700; color: #a855f7; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #23243f; padding-bottom: 10px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 11px; background: #0b0c1b; border: 1px solid #282945; border-radius: 8px; color: #fff; outline: none; font-size: 13px; }
        .form-group textarea { height: 70px; resize: none; }

        .btn-purple { width: 100%; padding: 11px; background: #a855f7; border: none; border-radius: 8px; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 5px; }
        .btn-purple:active { background: #9333ea; }

        .sub-card { background: #121324; border: 1px solid #23243f; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .sub-title { font-size: 13px; font-weight: bold; color: #ff3b5c; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>

    <div class="header-title">
        <i class="fa-solid fa-user-shield"></i> Super Admin Panel
    </div>

    <!-- Admin Navigation Menu -->
    <div class="admin-nav-grid">
        <div class="nav-card active" onclick="switchSection('sec-video', this)">
            <i class="fa-solid fa-video"></i>
            <p>ভিডিও আপলোড</p>
        </div>
        <div class="nav-card" onclick="switchSection('sec-ads', this)">
            <i class="fa-solid fa-sack-dollar"></i>
            <p>অ্যাড সেটআপ</p>
        </div>
        <div class="nav-card" onclick="switchSection('sec-category', this)">
            <i class="fa-solid fa-tag"></i>
            <p>ক্যাটাগরি</p>
        </div>
        <div class="nav-card" onclick="switchSection('sec-links', this)">
            <i class="fa-solid fa-link"></i>
            <p>মেনু লিংক</p>
        </div>
        <div class="nav-card" onclick="switchSection('sec-settings', this)">
            <i class="fa-solid fa-gear"></i>
            <p>সেটিংস</p>
        </div>
    </div>

    <!-- 1. VIDEO UPLOAD SECTION -->
    <div id="sec-video" class="admin-section active">
        <div class="section-header"><i class="fa-solid fa-upload"></i> নতুন ভিডিও পোস্ট করুন</div>
        <div class="form-group">
            <label>ভিডিও শিরোনাম (Title)</label>
            <input type="text" id="v-title" placeholder="Video Title">
        </div>
        <div class="form-group">
            <label>ছবি (URL)</label>
            <input type="text" id="v-thumb" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>লিংক (Embed Video URL)</label>
            <input type="text" id="v-url" placeholder="Download link...">
        </div>
        <div class="form-group">
            <label>ক্যাটাগরি</label>
            <select id="v-cat">
                <option value="all">All</option>
                <option value="viral">viral</option>
            </select>
        </div>
        <div class="form-group">
            <label>কতগুলো অ্যাড দেখতে হবে (Ads Count)</label>
            <input type="number" id="v-ads" value="1">
        </div>
        <button class="btn-purple" onclick="uploadVideo()">PUBLISH VIDEO</button>
    </div>

    <!-- 2. ADS SETUP SECTION -->
    <div id="sec-ads" class="admin-section">
        <div class="section-header"><i class="fa-solid fa-sack-dollar"></i> অ্যাড সেটআপ</div>

        <div class="sub-card">
            <div class="sub-title"><i class="fa-solid fa-rectangle-ad"></i> Monetag (2nd Ad)</div>
            <div class="form-group">
                <label>Zone ID (Example: 18110498)</label>
                <input type="text" id="ad-monetag" placeholder="18110498">
            </div>
            <button class="btn-purple" onclick="saveMonetag()">Save Monetag ID</button>
        </div>

        <div class="sub-card">
            <div class="sub-title"><i class="fa-solid fa-chart-line"></i> Adsgram Block ID</div>
            <div class="form-group">
                <label>Example: 12345</label>
                <input type="text" id="ad-adsgram" placeholder="12345">
            </div>
            <button class="btn-purple" onclick="saveAdsgram()">Add ID</button>
        </div>

        <div class="sub-card">
            <div class="sub-title"><i class="fa-solid fa-code"></i> Banner Ads (HTML)</div>
            <div class="form-group">
                <textarea id="ad-banner" placeholder='<a href="..."><img src="..."></a>'></textarea>
            </div>
            <button class="btn-purple" onclick="saveBanner()">Add Banner</button>
        </div>
    </div>

    <!-- 3. CATEGORY SECTION (SCREENSHOT EXACT REPLICA) -->
    <div id="sec-category" class="admin-section">
        <div class="section-header"><i class="fa-solid fa-tag"></i> ক্যাটাগরি</div>
        <div class="form-group">
            <label>ক্যাটাগরি আইডি (ছোট হাতের অক্ষর)</label>
            <input type="text" id="cat-id" placeholder="viral">
        </div>
        <div class="form-group">
            <label>ক্যাটাগরি নাম (Name)</label>
            <input type="text" id="cat-name" placeholder="Name (ভাইরাল)">
        </div>
        <button class="btn-purple" onclick="addCategory()">Add</button>
    </div>

    <!-- 4. LINKS SECTION -->
    <div id="sec-links" class="admin-section">
        <div class="section-header"><i class="fa-solid fa-link"></i> লিংক সেটিং</div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="link-title" placeholder="যেমন: Join Telegram Channel">
        </div>
        <div class="form-group">
            <label>URL</label>
            <input type="text" id="link-url" placeholder="https://t.me/...">
        </div>
        <button class="btn-purple" onclick="addCustomLink()">Add</button>
    </div>

    <!-- 5. SETTINGS SECTION -->
    <div id="sec-settings" class="admin-section">
        <div class="section-header"><i class="fa-solid fa-gear"></i> সেটিংস</div>
        <div class="form-group">
            <label>Telegram Bot App Link (Direct Link)</label>
            <input type="text" id="set-botlink" placeholder="https://t.me/your_bot/app">
        </div>
        <div class="form-group">
            <label>Tutorial ID (Youtube)</label>
            <input type="text" id="set-ytid" placeholder="যেমন: e7AemaxhT94">
        </div>
        <div class="form-group">
            <label>Daily Limit</label>
            <input type="number" id="set-limit" placeholder="10">
        </div>
        <button class="btn-purple" onclick="saveGlobalSettings()">Save</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtKYGQ-fvuVifuDNJ_tlNmKJ2gjEqyYWU",
            authDomain: "viralzone-3e974.firebaseapp.com",
            databaseURL: "https://viralzone-3e974-default-rtdb.firebaseio.com",
            projectId: "viralzone-3e974",
            storageBucket: "viralzone-3e974.firebasestorage.app",
            messagingSenderId: "63267470809",
            appId: "1:63267470809:web:fa7f5d92063e69c42aadc8"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function switchSection(secId, element) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            element.classList.add('active');
        }

        // Add Category Function
        function addCategory() {
            const catId = document.getElementById('cat-id').value.toLowerCase().trim();
            const catName = document.getElementById('cat-name').value.trim();

            if(!catId || !catName) {
                alert("ক্যাটাগরি আইডি এবং নাম দুটিই লিখুন!");
                return;
            }

            database.ref('categories/' + catId).set({
                id: catId,
                name: catName
            }, (error) => {
                if(error) alert("এরর: " + error.message);
                else {
                    alert("ক্যাটাগরি সফলভাবে যোগ হয়েছে!");
                    document.getElementById('cat-id').value = '';
                    document.getElementById('cat-name').value = '';
                }
            });
        }

        function uploadVideo() {
            const title = document.getElementById('v-title').value;
            const thumb = document.getElementById('v-thumb').value;
            let url = document.getElementById('v-url').value;
            const cat = document.getElementById('v-cat').value;
            const ads = document.getElementById('v-ads').value;

            if(!title || !url) { alert("শিরোনাম এবং ভিডিও লিংক দিন!"); return; }
            if(url.includes("streamtape.com/v/")) url = url.replace("/v/", "/e/");

            database.ref('videos').push().set({
                title: title, thumb: thumb, url: url, category: cat, adsCount: parseInt(ads), views: 0, timestamp: Date.now()
            }, (err) => {
                if(err) alert("সমস্যা হয়েছে: " + err.message);
                else { alert("পোস্ট সফলভাবে পাবলিশ হয়েছে!"); clearVideoFields(); }
            });
        }

        function clearVideoFields() {
            document.getElementById('v-title').value = '';
            document.getElementById('v-thumb').value = '';
            document.getElementById('v-url').value = '';
        }

        function saveMonetag() {
            const val = document.getElementById('ad-monetag').value;
            database.ref('ad_config/monetag_id').set(val, (err) => { if(!err) alert("Monetag ID সেভ হয়েছে!"); });
        }

        function saveAdsgram() {
            const val = document.getElementById('ad-adsgram').value;
            database.ref('ad_config/adsgram_id').set(val, (err) => { if(!err) alert("Adsgram Block ID সেভ হয়েছে!"); });
        }

        function saveBanner() {
            const val = document.getElementById('ad-banner').value;
            database.ref('ad_config/banner_code').set(val, (err) => { if(!err) alert("Banner Code সেভ হয়েছে!"); });
        }

        function addCustomLink() {
            const title = document.getElementById('link-title').value;
            const url = document.getElementById('link-url').value;
            if(!title || !url) { alert("Title এবং URL দুটিই দিন।"); return; }

            database.ref('custom_links').push().set({ title: title, url: url }, (err) => {
                if(!err) {
                    alert("লিংক যোগ করা হয়েছে!");
                    document.getElementById('link-title').value = '';
                    document.getElementById('link-url').value = '';
                }
            });
        }

        function saveGlobalSettings() {
            const botlink = document.getElementById('set-botlink').value;
            const ytid = document.getElementById('set-ytid').value;
            const limit = document.getElementById('set-limit').value;

            database.ref('settings').set({
                bot_link: botlink,
                yt_id: ytid,
                daily_limit: limit
            }, (err) => {
                if(!err) alert("সেটিংস আপডেট করা হয়েছে!");
            });
        }
    </script>
</body>
</html>
