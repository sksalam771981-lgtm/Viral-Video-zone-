<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Viral Video Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0c1b;
            --bg-card: #141529;
            --primary: #a855f7;
            --primary-gradient: linear-gradient(135deg, #ec4899, #8b5cf6);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: 1px solid rgba(255,255,255,0.08);
            --danger: #ef4444;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1, h2 { color: var(--primary); margin-bottom: 20px; text-align: center; }
        .card { background: var(--bg-card); border: var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; background: #1c1d38; border: var(--border); color: white; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary-gradient); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        
        .video-list-item { display: flex; justify-content: space-between; align-items: center; background: #1c1d38; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: var(--border); }
        .video-info h4 { font-size: 15px; margin-bottom: 4px; }
        .video-info p { font-size: 12px; color: var(--text-muted); }
        
        .delete-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 20px; border-radius: 50px; font-size: 13px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>

    <!-- 1. Ad Settings / Setup Section (এখানে আপনার অ্যাড কোড বা আইডি কন্ট্রোল করতে পারবেন) -->
    <div class="card">
        <h2><i class="fas fa-ad"></i> অ্যাপ ও অ্যাড সেটিংস</h2>
        <div class="form-group">
            <label>Monetag Zone ID / Ad Script</label>
            <input type="text" id="monetagInput" placeholder="আপনার মনিট্যাগ আইডি দিন">
        </div>
        <div class="form-group">
            <label>Adsgram Block ID</label>
            <input type="text" id="adsgramInput" placeholder="আপনার এডসগ্রাম ব্লক আইডি দিন">
        </div>
        <div class="form-group">
            <label>ব্যানার অ্যাড কোড (HTML/Banner Script)</label>
            <textarea id="bannerCodeInput" rows="3" placeholder="ব্যানার অ্যাড কোড এখানে পেস্ট করুন"></textarea>
        </div>
        <button class="btn" id="saveAdBtn">অ্যাড সেটিংস সেভ করুন</button>
    </div>

    <!-- 2. Video Upload Section -->
    <div class="card">
        <h2><i class="fas fa-video"></i> নতুন ভিডিও আপলোড করুন</h2>
        <div class="form-group">
            <label>ভিডিওর নাম / টাইটেল</label>
            <input type="text" id="vTitle" placeholder="ভিডিওর শিরোনাম লিখুন">
        </div>
        <div class="form-group">
            <label>থাম্বনেইল ইমেজ লিংক (Image URL)</label>
            <input type="text" id="vImage" placeholder="ছবির ডাইরেক্ট লিংক দিন">
        </div>
        <div class="form-group">
            <label>ডাউনলোড / মূল ভিডিও লিংক</label>
            <input type="text" id="vLink" placeholder="ডাউনলোড বা দেখার লিংক দিন">
        </div>
        <div class="form-group">
            <label>ক্যাটেগরি নির্বাচন করুন</label>
            <select id="vCategory">
                <option value="">ক্যাটেগরি লোড হচ্ছে...</option>
            </select>
        </div>
        <div class="form-group">
            <label>কতটি অ্যাড দেখতে হবে (Ads Count)</label>
            <input type="number" id="vAdsCount" value="1" min="1">
        </div>
        <button class="btn" id="uploadBtn">ভিডিও পাবলিশ করুন</button>
    </div>

    <!-- 3. Manage / Delete Videos Section -->
    <div class="card">
        <h2><i class="fas fa-list"></i> ভিডিও ম্যানেজ ও ডিলিট করুন</h2>
        <div id="adminVideoList">
            <p style="text-align: center; color: var(--text-muted);">লোড হচ্ছে...</p>
        </div>
    </div>

    <!-- 4. Category Manager -->
    <div class="card">
        <h2><i class="fas fa-folder-plus"></i> ক্যাটেগরি যোগ করুন</h2>
        <div class="form-group">
            <label>ক্যাটেগরি আইডি (ইংরেজি যেমন: funny, viral)</label>
            <input type="text" id="catId" placeholder="cat_id">
        </div>
        <div class="form-group">
            <label>ক্যাটেগরির নাম</label>
            <input type="text" id="catName" placeholder="ক্যাটেগরির নাম">
        </div>
        <button class="btn" id="addCatBtn">ক্যাটেগরি যোগ করুন</button>
    </div>
</div>

<div class="toast" id="toast">সফলভাবে সম্পন্ন হয়েছে!</div>

<!-- Firebase Script -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";  
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";  
      
    const firebaseConfig = {  
      apiKey: "AIzaSyB1ZubF0ZPvtdhcWWBa2PGorU7lx0OkN4I",
      authDomain: "admin-726ec.firebaseapp.com",  
      databaseURL: "https://admin-726ec-default-rtdb.firebaseio.com",  
      projectId: "admin-726ec",  
      storageBucket: "admin-726ec.firebasestorage.app",
      messagingSenderId: "97796496921",
      appId: "1:97796496921:web:4bf82701a35b6caca4d488",
      measurementId: "G-Y8Y7S92HD0"
    };  
      
    const app = initializeApp(firebaseConfig);  
    const db = getDatabase(app);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // Load Existing Ad Settings
    onValue(ref(db, 'ad_settings'), snap => {
        if(snap.exists()) {
            const data = snap.val();
            document.getElementById('monetagInput').value = data.monetagId || '';
            document.getElementById('adsgramInput').value = data.adsgramId || '';
            document.getElementById('bannerCodeInput').value = data.bannerAdCode || '';
        }
    });

    // Save Ad Settings to Firebase
    document.getElementById('saveAdBtn').onclick = () => {
        const monetagId = document.getElementById('monetagInput').value.trim();
        const adsgramId = document.getElementById('adsgramInput').value.trim();
        const bannerAdCode = document.getElementById('bannerCodeInput').value.trim();

        set(ref(db, 'ad_settings'), {
            monetagId,
            adsgramId,
            bannerAdCode
        }).then(() => {
            showToast('অ্যাড সেটিংস সফলভাবে আপডেট হয়েছে!');
        }).catch(err => {
            alert('ত্রুটি: ' + err.message);
        });
    };

    // 1. Upload Video Logic
    document.getElementById('uploadBtn').onclick = () => {
        const title = document.getElementById('vTitle').value.trim();
        const image_url = document.getElementById('vImage').value.trim();
        const download_link = document.getElementById('vLink').value.trim();
        const category = document.getElementById('vCategory').value;
        const theAdsCount = parseInt(document.getElementById('vAdsCount').value) || 1;

        if(!title || !image_url || !download_link || !category) {
            alert('দয়া করে সব ঘরগুলো পূরণ করুন!');
            return;
        }

        const newVideoRef = push(ref(db, 'videos'));
        set(newVideoRef, {
            title,
            image_url,
            download_link,
            category,
            ads_count: theAdsCount,
            view_count: 0,
            timestamp: Date.now()
        }).then(() => {
            showToast('ভিডিও সফলভাবে আপলোড হয়েছে!');
            document.getElementById('vTitle').value = '';
            document.getElementById('vImage').value = '';
            document.getElementById('vLink').value = '';
        }).catch(err => {
            alert('সমস্যা হয়েছে: ' + err.message);
        });
    };

    // 2. Fetch Categories for Dropdown
    onValue(ref(db, 'categories'), snap => {
        const select = document.getElementById('vCategory');
        select.innerHTML = '<option value="">ক্যাটেগরি বাছুন</option>';
        if(snap.exists()) {
            const cats = snap.val();
            Object.values(cats).forEach(c => {
                select.innerHTML += `<option value="${c.catId}">${c.catName}</option>`;
            });
        }
    });

    // 3. Load and Display Videos with Delete Option
    onValue(ref(db, 'videos'), snap => {
        const listDiv = document.getElementById('adminVideoList');
        listDiv.innerHTML = '';
        
        if(snap.exists()) {
            const data = snap.val();
            Object.entries(data).reverse().forEach(([id, item]) => {
                listDiv.innerHTML += `
                    <div class="video-list-item">
                        <div class="video-info">
                            <h4>${item.title}</h4>
                            <p>Category: ${item.category} | Views: ${item.view_count || 0}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteVideo('${id}')"><i class="fas fa-trash"></i> ডিলিট</button>
                    </div>
                `;
            });
        } else {
            listDiv.innerHTML = '<p style="text-align:center; color: var(--text-muted);">কোনো ভিডিও নেই!</p>';
        }
    });

    // 4. Delete Video Function
    window.deleteVideo = function(videoId) {
        if(confirm("আপনি কি সত্যিই এই ভিডিওটি ডিলিট করতে চান?")) {
            remove(ref(db, 'videos/' + videoId))
                .then(() => {
                    showToast('ভিডিও সফলভাবে ডিলিট করা হয়েছে!');
                })
                .catch(err => {
                    alert('ডিলিট করতে সমস্যা হয়েছে: ' + err.message);
                });
        }
    };

    // 5. Add Category Logic
    document.getElementById('addCatBtn').onclick = () => {
        const catId = document.getElementById('catId').value.trim();
        const catName = document.getElementById('catName').value.trim();

        if(!catId || !catName) {
            alert('ক্যাটেগরি আইডি এবং নাম দিন!');
            return;
        }

        set(ref(db, 'categories/' + catId), { catId, catName })
            .then(() => {
                showToast('ক্যাটেগরি যোগ হয়েছে!');
                document.getElementById('catId').value = '';
                document.getElementById('catName').value = '';
            });
    };
</script>

</body>
</html>
